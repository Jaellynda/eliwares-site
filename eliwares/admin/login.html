<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login – ELIWARES</title>
<link rel="stylesheet" href="../src/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="logo">
      <svg width="36" height="36" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#1a3c5e"/><path d="M8 22V14c0-3.3 2.7-6 6-6s6 2.7 6 6v1h-3v-1c0-1.7-1.3-3-3-3s-3 1.3-3 3v8H8z" fill="#fff"/><rect x="17" y="17" width="7" height="5" rx="1" fill="#4fc3f7"/></svg>
      <span style="font-size:1.4rem">ELIWARES</span>
    </div>
    <p>Admin Dashboard — Staff only</p>
    <form class="login-form" onsubmit="doLogin(event)">
      <input type="text" id="username" placeholder="Username" required autocomplete="username">
      <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
      <p class="login-error hidden" id="loginError">Invalid credentials. Try again.</p>
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>
    <p style="text-align:center;margin-top:1.5rem;font-size:0.8rem;color:#999">
      <a href="../index.html" style="color:#1a3c5e">← Back to store</a>
    </p>
  </div>
</div>
<script src="../src/data.js"></script>
<script>
  // Redirect if already logged in
  if (DB.checkAuth()) window.location.href = 'dashboard.html';

  function doLogin(e) {
    e.preventDefault();
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;
    if (DB.login(u, p)) {
      window.location.href = 'dashboard.html';
    } else {
      document.getElementById('loginError').classList.remove('hidden');
    }
  }
</script>
</body>
</html>
